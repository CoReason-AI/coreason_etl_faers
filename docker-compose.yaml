services:
  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: coreason
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coreason"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl_app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PGHOST=postgres_db
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgrespassword
      - PGDATABASE=coreason
      - APP_ENV=development
      - LOG_LEVEL=INFO
    depends_on:
      postgres_db:
        condition: service_healthy

volumes:
  postgres_data:
